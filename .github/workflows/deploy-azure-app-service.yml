name: Deploy Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: azure-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-app-service.outputs.webapp-url }}

    env:
      IMAGE_NAME: game-release-dashboard
      REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET solution
        run: dotnet restore GameReleaseDashboard.slnx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend for same-origin hosting
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /

      - name: Build .NET solution
        run: dotnet build GameReleaseDashboard.slnx --configuration Release --no-restore

      - name: Run backend integration tests
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push container image
        run: |
          IMAGE_SHA_TAG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_LATEST_TAG="${REGISTRY}/${IMAGE_NAME}:latest"
          docker build -t "${IMAGE_SHA_TAG}" -t "${IMAGE_LATEST_TAG}" .
          docker push "${IMAGE_SHA_TAG}"
          docker push "${IMAGE_LATEST_TAG}"

      - name: Deploy container to Azure App Service
        id: deploy-to-app-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/game-release-dashboard:${{ github.sha }}
