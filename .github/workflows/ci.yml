name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET solution
        run: dotnet restore GameReleaseDashboard.slnx

      - name: Build .NET solution
        run: dotnet build GameReleaseDashboard.slnx --configuration Release --no-restore

      - name: Run backend integration tests
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build production container image
        run: docker build -t game-release-dashboard-app .
