version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8080"
    volumes:
      - ./backend/App_Data:/app/App_Data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /
    depends_on:
      - backend
    ports:
      - "8080:80"
